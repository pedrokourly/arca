$kind: collection
scripts:
  - type: http:afterResponse
    code: "// Isso pega a resposta da requisição\r

      var jsonData = pm.response.json();\r

      \r

      // Isso salva o valor do campo \"token\" (do seu JSON de resposta) \r

      // numa variável de coleção chamada \"jwt_token\"\r

      pm.collectionVariables.set(\"jwt_token\", jsonData.token);"
    language: text/javascript
order: 3000

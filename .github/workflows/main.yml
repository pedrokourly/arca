name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  ci:
    name: Lint, Types & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=backend

      - name: Type check
        run: npm run check-types --workspace=backend

      - name: Unit tests (backend)
        run: npm run test --workspace=backend
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: ci-secret
          JWT_EXPIRATION: 3600s

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: ci

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arca
          POSTGRES_PASSWORD: arca
          POSTGRES_DB: arca_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://arca:arca@localhost:5432/arca_test

      - name: E2E tests
        run: npm run test:e2e --workspace=backend
        env:
          DATABASE_URL: postgresql://arca:arca@localhost:5432/arca_test
          JWT_SECRET: ci-secret
          JWT_EXPIRATION: 3600s
